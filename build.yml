name: Build Car Launcher APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Find project root
        run: |
          if [ -f "build.gradle" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          elif [ -f "CarLauncher/build.gradle" ]; then
            echo "PROJECT_DIR=CarLauncher" >> $GITHUB_ENV
          else
            find . -name "build.gradle" | head -20
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: |
          cd $PROJECT_DIR
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CarLauncher-debug
          path: "**/app/build/outputs/apk/debug/*.apk"
